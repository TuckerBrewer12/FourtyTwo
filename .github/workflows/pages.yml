# Deploy the static landing page in docs/ to GitHub Pages.
# Runs on every push to main (and on PRs for a preview check).
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:       # allow manual trigger from the Actions tab

# Allow one concurrent deployment; cancel in-progress runs on new push
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages:    write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact (docs/ folder)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
